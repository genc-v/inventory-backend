apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: backend
  namespace: inventory-app
spec:
  ingressClassName: traefik
  rules:
    - http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 3000
